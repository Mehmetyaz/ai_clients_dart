name: openai_dart
description: Dart client for the OpenAI API. Provides type-safe access to the latest OpenAI GPT and image models, Responses API, Whisper, Embeddings, and more with streaming support.
version: 1.1.0
repository: https://github.com/davidmigloz/ai_clients_dart/tree/main/packages/openai_dart
issue_tracker: https://github.com/davidmigloz/ai_clients_dart/issues?q=label:p:openai_dart
homepage: https://github.com/davidmigloz/ai_clients_dart
documentation: https://langchaindart.dev

funding:
  - https://github.com/sponsors/davidmigloz

topics:
  - nlp
  - gen-ai
  - llms
  - openai
  - gpt

environment:
  sdk: ">=3.9.0 <4.0.0"
resolution: workspace

dependencies:
  http: ^1.6.0
  logging: ^1.3.0
  meta: ^1.16.0
  web_socket: ^1.0.1

dev_dependencies:
  test: ^1.26.2
  mocktail: ^1.0.4
  coverage: ^1.15.0
